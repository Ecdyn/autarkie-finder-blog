<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect
    // Redirects 404 to index.html while preserving the path
    var path = window.location.pathname;
    sessionStorage.setItem('redirect_path', path);
    window.location.replace('/');
  </script>
</head>
<body>
</body>
</html>
