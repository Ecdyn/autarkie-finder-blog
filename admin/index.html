<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Autarkie-Finder CMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }
    .login { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box { text-align: center; max-width: 400px; padding: 2rem; }
    .login-box h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .login-box p { color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .login-box input { width: 100%; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #1a1a1a; color: #e5e5e5; font-size: 0.95rem; margin-bottom: 1rem; outline: none; }
    .login-box input:focus { border-color: #22c55e; }
    .btn { width: 100%; padding: 0.8rem; border-radius: 8px; border: none; background: #22c55e; color: #000; font-weight: 600; font-size: 0.95rem; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
    .cms { display: none; }
    .cms-header { background: #111; border-bottom: 1px solid rgba(255,255,255,0.08); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .cms-header h2 { font-size: 1.1rem; }
    .cms-header button { background: none; border: 1px solid rgba(255,255,255,0.15); color: #e5e5e5; padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .cms-body { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }
    .posts-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .posts-header h3 { font-size: 1.2rem; }
    .post-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .post-item { background: #111; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 1rem 1.2rem; cursor: pointer; transition: border-color 0.2s; }
    .post-item:hover { border-color: #22c55e; }
    .post-item h4 { font-size: 1rem; margin-bottom: 0.3rem; }
    .post-item span { font-size: 0.8rem; color: #666; }
    .editor { display: none; }
    .editor label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.3rem; margin-top: 1rem; }
    .editor input, .editor select, .editor textarea { width: 100%; padding: 0.7rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #1a1a1a; color: #e5e5e5; font-family: inherit; font-size: 0.9rem; outline: none; }
    .editor input:focus, .editor select:focus, .editor textarea:focus { border-color: #22c55e; }
    .editor textarea { min-height: 300px; resize: vertical; line-height: 1.6; }
    .editor select { appearance: auto; }
    .editor-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; }
    .editor-actions .btn { width: auto; padding: 0.7rem 2rem; }
    .btn-secondary { background: #333 !important; color: #e5e5e5 !important; }
    .status { padding: 0.8rem 1.2rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
    .status.success { display: block; background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .status.error { display: block; background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .loading { color: #888; text-align: center; padding: 2rem; }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login" id="loginView">
    <div class="login-box">
      <h1>Autarkie-Finder CMS</h1>
      <p>Gib deinen GitHub Token ein, um Blog-Beiträge zu verwalten.</p>
      <input type="password" id="tokenInput" placeholder="GitHub Token eingeben...">
      <button class="btn" onclick="login()">Einloggen</button>
    </div>
  </div>

  <!-- CMS -->
  <div class="cms" id="cmsView">
    <div class="cms-header">
      <h2>Autarkie-Finder Blog</h2>
      <button onclick="logout()">Abmelden</button>
    </div>
    <div class="cms-body">
      <div id="statusMsg" class="status"></div>

      <!-- Post List -->
      <div id="postList">
        <div class="posts-header">
          <h3>Blog-Beiträge</h3>
          <button class="btn" onclick="newPost()">+ Neuer Beitrag</button>
        </div>
        <div id="posts" class="post-list">
          <div class="loading">Beiträge werden geladen...</div>
        </div>
      </div>

      <!-- Editor -->
      <div id="editor" class="editor">
        <div class="posts-header">
          <h3 id="editorTitle">Neuer Beitrag</h3>
          <button class="btn btn-secondary" onclick="showList()">Zurück</button>
        </div>

        <label>Titel</label>
        <input type="text" id="postTitle" placeholder="Titel des Beitrags">

        <label>Kategorie</label>
        <select id="postCategory">
          <option value="energie">Energie</option>
          <option value="wasser">Wasser</option>
          <option value="ernaehrung">Ernährung</option>
          <option value="wohnen">Wohnen</option>
          <option value="offgrid">Off-Grid</option>
          <option value="technik">Technik</option>
        </select>

        <label>Beschreibung (SEO)</label>
        <input type="text" id="postDesc" placeholder="Kurze Beschreibung für Google (max 160 Zeichen)">

        <label>Lesezeit (Minuten)</label>
        <input type="number" id="postTime" value="5" min="1" max="30">

        <label>Inhalt (Markdown)</label>
        <textarea id="postContent" placeholder="Schreibe deinen Beitrag in Markdown..."></textarea>

        <div class="editor-actions">
          <button class="btn" onclick="savePost()">Veröffentlichen</button>
          <button class="btn btn-secondary" onclick="showList()">Abbrechen</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var TOKEN = '';
    var REPO = 'ecdyn/autarkie-finder-blog';
    var BRANCH = 'main';
    var editingPath = null;
    var editingSha = null;

    // Check saved token
    if (localStorage.getItem('gh_token')) {
      TOKEN = localStorage.getItem('gh_token');
      showCMS();
    }

    function login() {
      var t = document.getElementById('tokenInput').value.trim();
      if (!t) return;
      TOKEN = t;
      localStorage.setItem('gh_token', t);
      showCMS();
    }

    function logout() {
      TOKEN = '';
      localStorage.removeItem('gh_token');
      document.getElementById('cmsView').style.display = 'none';
      document.getElementById('loginView').style.display = 'flex';
    }

    function showCMS() {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('cmsView').style.display = 'block';
      loadPosts();
    }

    function showList() {
      document.getElementById('editor').style.display = 'none';
      document.getElementById('postList').style.display = 'block';
      editingPath = null;
      editingSha = null;
      loadPosts();
    }

    function showStatus(msg, type) {
      var el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = 'status ' + type;
      setTimeout(function() { el.className = 'status'; }, 4000);
    }

    async function ghAPI(path, options) {
      var url = 'https://api.github.com/repos/' + REPO + path;
      var headers = { 'Authorization': 'token ' + TOKEN, 'Accept': 'application/vnd.github.v3+json' };
      if (options && options.body) headers['Content-Type'] = 'application/json';
      var res = await fetch(url, Object.assign({ headers: headers }, options || {}));
      if (res.status === 401) { logout(); throw new Error('Token ungültig'); }
      return res;
    }

    async function loadPosts() {
      var container = document.getElementById('posts');
      container.innerHTML = '<div class="loading">Beiträge werden geladen...</div>';
      try {
        var res = await ghAPI('/contents/_posts?ref=' + BRANCH);
        if (res.status === 404) {
          container.innerHTML = '<p style="color:#888;text-align:center;padding:2rem;">Noch keine Beiträge. Erstelle deinen ersten!</p>';
          return;
        }
        var files = await res.json();
        if (!files.length) {
          container.innerHTML = '<p style="color:#888;text-align:center;padding:2rem;">Noch keine Beiträge.</p>';
          return;
        }
        files.sort(function(a, b) { return b.name.localeCompare(a.name); });
        container.innerHTML = '';
        files.forEach(function(f) {
          var name = f.name.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace('.md', '').replace(/-/g, ' ');
          var date = f.name.substring(0, 10);
          var div = document.createElement('div');
          div.className = 'post-item';
          div.innerHTML = '<h4>' + name.charAt(0).toUpperCase() + name.slice(1) + '</h4><span>' + date + '</span>';
          div.onclick = function() { editPost(f.path, f.sha); };
          container.appendChild(div);
        });
      } catch (e) {
        container.innerHTML = '<p style="color:#ef4444;">Fehler: ' + e.message + '</p>';
      }
    }

    function newPost() {
      editingPath = null;
      editingSha = null;
      document.getElementById('editorTitle').textContent = 'Neuer Beitrag';
      document.getElementById('postTitle').value = '';
      document.getElementById('postCategory').value = 'energie';
      document.getElementById('postDesc').value = '';
      document.getElementById('postTime').value = '5';
      document.getElementById('postContent').value = '';
      document.getElementById('postList').style.display = 'none';
      document.getElementById('editor').style.display = 'block';
    }

    async function editPost(path, sha) {
      document.getElementById('postList').style.display = 'none';
      document.getElementById('editor').style.display = 'block';
      document.getElementById('editorTitle').textContent = 'Beitrag bearbeiten';
      try {
        var res = await ghAPI('/contents/' + path + '?ref=' + BRANCH);
        var data = await res.json();
        var content = atob(data.content.replace(/\n/g, ''));
        var decoded = decodeURIComponent(escape(content));
        editingPath = path;
        editingSha = data.sha;
        var parts = decoded.split('---');
        if (parts.length >= 3) {
          var front = parts[1];
          var body = parts.slice(2).join('---').trim();
          var getValue = function(key) {
            var m = front.match(new RegExp(key + ':\\s*"?([^"\\n]*)"?'));
            return m ? m[1].trim() : '';
          };
          document.getElementById('postTitle').value = getValue('title');
          document.getElementById('postCategory').value = getValue('category');
          document.getElementById('postDesc').value = getValue('description');
          document.getElementById('postTime').value = getValue('reading_time') || '5';
          document.getElementById('postContent').value = body;
        }
      } catch (e) {
        showStatus('Fehler beim Laden: ' + e.message, 'error');
      }
    }

    async function savePost() {
      var title = document.getElementById('postTitle').value.trim();
      var category = document.getElementById('postCategory').value;
      var desc = document.getElementById('postDesc').value.trim();
      var time = document.getElementById('postTime').value;
      var content = document.getElementById('postContent').value;

      if (!title) { showStatus('Bitte Titel eingeben', 'error'); return; }
      if (!content) { showStatus('Bitte Inhalt eingeben', 'error'); return; }

      var now = new Date();
      var dateStr = now.toISOString().substring(0, 10);
      var slug = title.toLowerCase().replace(/[äÄ]/g,'ae').replace(/[öÖ]/g,'oe').replace(/[üÜ]/g,'ue').replace(/[ß]/g,'ss').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

      var frontmatter = '---\n';
      frontmatter += 'title: "' + title + '"\n';
      frontmatter += 'date: ' + dateStr + '\n';
      frontmatter += 'author: Autarkie-Finder\n';
      frontmatter += 'category: ' + category + '\n';
      frontmatter += 'description: "' + desc + '"\n';
      frontmatter += 'reading_time: ' + time + '\n';
      frontmatter += 'featured: false\n';
      frontmatter += '---\n\n';

      var fullContent = frontmatter + content;
      var encoded = btoa(unescape(encodeURIComponent(fullContent)));

      var path = editingPath || '_posts/' + dateStr + '-' + slug + '.md';

      var body = {
        message: editingPath ? 'Update: ' + title : 'Neuer Beitrag: ' + title,
        content: encoded,
        branch: BRANCH
      };

      if (editingSha) body.sha = editingSha;

      try {
        var res = await ghAPI('/contents/' + path, { method: 'PUT', body: JSON.stringify(body) });
        if (res.ok) {
          showStatus('Beitrag erfolgreich veröffentlicht!', 'success');
          showList();
        } else {
          var err = await res.json();
          showStatus('Fehler: ' + (err.message || 'Unbekannt'), 'error');
        }
      } catch (e) {
        showStatus('Fehler: ' + e.message, 'error');
      }
    }
  </script>

</body>
</html>
