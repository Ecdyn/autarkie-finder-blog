<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Autarkie-Finder CMS</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login { text-align: center; max-width: 400px; padding: 2rem; }
    .login h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .login p { color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .login input { width: 100%; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #1a1a1a; color: #e5e5e5; font-size: 0.95rem; margin-bottom: 1rem; outline: none; }
    .login input:focus { border-color: #22c55e; }
    .login button { width: 100%; padding: 0.8rem; border-radius: 8px; border: none; background: #22c55e; color: #000; font-weight: 600; font-size: 0.95rem; cursor: pointer; }
    .login button:hover { opacity: 0.9; }
    #cms-root { display: none; }
  </style>
</head>
<body>
  <div class="login" id="loginForm">
    <h1>Autarkie-Finder CMS</h1>
    <p>Gib deinen GitHub Token ein, um dich anzumelden.</p>
    <input type="password" id="tokenInput" placeholder="GitHub Token eingeben...">
    <button onclick="startCMS()">Einloggen</button>
  </div>
  <div id="cms-root"></div>
  <script>
    var savedToken = localStorage.getItem('gh_token');
    if (savedToken) { initCMS(savedToken); }

    function startCMS() {
      var token = document.getElementById('tokenInput').value.trim();
      if (!token) return;
      localStorage.setItem('gh_token', token);
      initCMS(token);
    }

    function initCMS(token) {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('cms-root').style.display = 'block';
      window.CMS_MANUAL_INIT = true;
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
      s.onload = function() {
        CMS.init({
          config: {
            backend: {
              name: 'github',
              repo: 'ecdyn/autarkie-finder-blog',
              branch: 'main',
              auth_type: '',
              token: token
            },
            media_folder: 'images/uploads',
            public_folder: '/images/uploads',
            locale: 'de',
            collections: [{
              name: 'blog',
              label: 'Blog-Beiträge',
              folder: '_posts',
              create: true,
              slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
              fields: [
                { label: 'Titel', name: 'title', widget: 'string' },
                { label: 'Datum', name: 'date', widget: 'datetime', format: 'YYYY-MM-DD' },
                { label: 'Autor', name: 'author', widget: 'string', default: 'Autarkie-Finder' },
                { label: 'Kategorie', name: 'category', widget: 'select', options: [
                  { label: 'Energie', value: 'energie' },
                  { label: 'Wasser', value: 'wasser' },
                  { label: 'Ernaehrung', value: 'ernaehrung' },
                  { label: 'Wohnen', value: 'wohnen' },
                  { label: 'Off-Grid', value: 'offgrid' },
                  { label: 'Technik', value: 'technik' }
                ]},
                { label: 'Beitragsbild', name: 'image', widget: 'image', required: false },
                { label: 'Beschreibung (SEO)', name: 'description', widget: 'text' },
                { label: 'Lesezeit (Minuten)', name: 'reading_time', widget: 'number', default: 5 },
                { label: 'Empfohlen', name: 'featured', widget: 'boolean', default: false },
                { label: 'Inhalt', name: 'body', widget: 'markdown' }
              ]
            }]
          }
        });
      };
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
