<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Autarkie-Finder CMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }

    /* Login */
    .login { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1.5rem; }
    .login-box { text-align: center; width: 100%; max-width: 400px; }
    .login-box h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
    .login-box .subtitle { color: #888; margin-bottom: 1.5rem; font-size: 0.88rem; }
    .login-box input { width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #1a1a1a; color: #e5e5e5; font-size: 0.92rem; margin-bottom: 0.8rem; outline: none; font-family: inherit; }
    .login-box input:focus { border-color: #22c55e; }

    /* Buttons */
    .btn { padding: 0.7rem 1.5rem; border-radius: 8px; border: none; background: #22c55e; color: #000; font-weight: 600; font-size: 0.9rem; cursor: pointer; font-family: inherit; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 0.5rem 1rem; font-size: 0.82rem; }
    .btn-secondary { background: #2a2a2a; color: #e5e5e5; }
    .btn-secondary:hover { background: #333; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }

    /* CMS Layout */
    .cms { display: none; }
    .cms-header {
      background: #111; border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 10;
    }
    .cms-header h2 { font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .cms-header .logo-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; }
    .cms-body { max-width: 800px; margin: 0 auto; padding: 1.5rem; }

    /* Status */
    .status { padding: 0.7rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.88rem; display: none; }
    .status.success { display: block; background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
    .status.error { display: block; background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }

    /* Post List */
    .posts-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; gap: 1rem; flex-wrap: wrap; }
    .posts-header h3 { font-size: 1.1rem; }
    .post-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .post-item {
      background: #111; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
      padding: 1rem 1.2rem; cursor: pointer; transition: border-color 0.2s;
      display: flex; justify-content: space-between; align-items: center; gap: 1rem;
    }
    .post-item:hover { border-color: rgba(255,255,255,0.2); }
    .post-item-info h4 { font-size: 0.95rem; margin-bottom: 0.2rem; }
    .post-item-info .meta { font-size: 0.78rem; color: #666; display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .post-item-info .cat-tag { background: rgba(34,197,94,0.15); color: #22c55e; padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; }
    .post-item-info .status-tag { padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; }
    .post-item-info .status-tag.scheduled { background: rgba(234,179,8,0.15); color: #eab308; }
    .post-item-info .status-tag.draft { background: rgba(156,163,175,0.15); color: #9ca3af; }
    .post-item-info .status-tag.live { background: rgba(34,197,94,0.15); color: #22c55e; }
    .post-item-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

    /* Editor */
    .editor { display: none; }
    .editor-section { margin-bottom: 1.5rem; }
    .editor-section-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #22c55e; margin-bottom: 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.82rem; color: #aaa; margin-bottom: 0.3rem; }
    .field label .hint { font-weight: 400; color: #555; font-size: 0.78rem; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.65rem 0.9rem; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1); background: #1a1a1a;
      color: #e5e5e5; font-family: inherit; font-size: 0.9rem; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: #22c55e; }
    .field select { appearance: auto; }
    .field textarea { min-height: 350px; resize: vertical; line-height: 1.7; }
    .field .char-count { font-size: 0.75rem; color: #555; margin-top: 0.2rem; text-align: right; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .image-preview { margin-top: 0.5rem; max-width: 100%; max-height: 200px; border-radius: 8px; display: none; }

    .editor-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .editor-actions .btn { min-width: 140px; text-align: center; }

    .loading { color: #888; text-align: center; padding: 2rem; }
    .empty { color: #555; text-align: center; padding: 3rem 1rem; font-size: 0.95rem; }

    /* Responsive */
    @media (max-width: 600px) {
      .cms-header { padding: 0.7rem 1rem; }
      .cms-body { padding: 1rem; }
      .field-row { grid-template-columns: 1fr; }
      .post-item { flex-direction: column; align-items: flex-start; }
      .post-item-actions { width: 100%; }
      .post-item-actions .btn { flex: 1; text-align: center; }
      .editor-actions { flex-direction: column; }
      .editor-actions .btn { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login" id="loginView">
    <div class="login-box">
      <h1>Autarkie-Finder CMS</h1>
      <p class="subtitle">Blog-Beiträge verwalten</p>
      <input type="password" id="tokenInput" placeholder="GitHub Token eingeben...">
      <button class="btn btn-full" onclick="login()">Einloggen</button>
    </div>
  </div>

  <!-- CMS -->
  <div class="cms" id="cmsView">
    <div class="cms-header">
      <h2><span class="logo-dot"></span> Autarkie-Finder CMS</h2>
      <button class="btn btn-sm btn-secondary" onclick="logout()">Abmelden</button>
    </div>
    <div class="cms-body">
      <div id="statusMsg" class="status"></div>

      <!-- Post List -->
      <div id="postList">
        <div class="posts-header">
          <h3>Blog-Beiträge</h3>
          <button class="btn btn-sm" onclick="newPost()">+ Neuer Beitrag</button>
        </div>
        <div id="posts" class="post-list">
          <div class="loading">Beiträge werden geladen...</div>
        </div>
      </div>

      <!-- Editor -->
      <div id="editor" class="editor">
        <div class="posts-header">
          <h3 id="editorTitle">Neuer Beitrag</h3>
          <button class="btn btn-sm btn-secondary" onclick="showList()">Zurück</button>
        </div>

        <!-- Beitrag -->
        <div class="editor-section">
          <div class="editor-section-title">Beitrag</div>
          <div class="field">
            <label>Titel</label>
            <input type="text" id="postTitle" placeholder="Titel des Beitrags">
          </div>
          <div class="field-row">
            <div class="field">
              <label>Kategorie</label>
              <select id="postCategory">
                <option value="energie">Energie</option>
                <option value="wasser">Wasser</option>
                <option value="ernaehrung">Ernährung</option>
                <option value="wohnen">Wohnen</option>
                <option value="offgrid">Off-Grid</option>
                <option value="technik">Technik</option>
              </select>
            </div>
            <div class="field">
              <label>Lesezeit (Minuten)</label>
              <input type="number" id="postTime" value="5" min="1" max="60">
            </div>
          </div>
          <div class="field">
            <label>Inhalt <span class="hint">(Markdown-Format)</span></label>
            <textarea id="postContent" placeholder="# Überschrift&#10;&#10;Dein Text hier...&#10;&#10;## Unterüberschrift&#10;&#10;- Aufzählung 1&#10;- Aufzählung 2&#10;&#10;**Fett** und *kursiv*"></textarea>
          </div>
        </div>

        <!-- Planung -->
        <div class="editor-section">
          <div class="editor-section-title">Veröffentlichung</div>
          <div class="field">
            <label>Status</label>
            <select id="postStatus" onchange="toggleSchedule()">
              <option value="publish">Sofort veröffentlichen</option>
              <option value="scheduled">Geplant (Datum & Uhrzeit)</option>
              <option value="draft">Entwurf (nicht sichtbar)</option>
            </select>
          </div>
          <div id="scheduleFields" style="display:none;">
            <div class="field-row">
              <div class="field">
                <label>Veröffentlichungsdatum</label>
                <input type="date" id="postDate">
              </div>
              <div class="field">
                <label>Uhrzeit</label>
                <input type="time" id="postTimeSchedule" value="08:00">
              </div>
            </div>
            <div id="scheduleInfo" style="font-size:0.8rem;color:#888;margin-top:-0.5rem;margin-bottom:1rem;"></div>
          </div>
        </div>

        <!-- Bild -->
        <div class="editor-section">
          <div class="editor-section-title">Beitragsbild</div>
          <div class="field">
            <label>Bild-URL <span class="hint">(Unsplash, eigenes Hosting, oder leer lassen)</span></label>
            <input type="url" id="postImage" placeholder="https://images.unsplash.com/photo-..." oninput="previewImage()">
            <img id="imagePreview" class="image-preview" alt="Vorschau">
          </div>
          <div class="field">
            <label>Bild-Beschreibung (Alt-Text) <span class="hint">(wichtig für SEO & Barrierefreiheit)</span></label>
            <input type="text" id="postImageAlt" placeholder="z.B. Solarpanels auf einem Einfamilienhaus">
          </div>
        </div>

        <!-- SEO -->
        <div class="editor-section">
          <div class="editor-section-title">SEO & Meta-Daten</div>
          <div class="field">
            <label>Meta-Beschreibung <span class="hint">(wird bei Google angezeigt, 120-160 Zeichen ideal)</span></label>
            <input type="text" id="postDesc" placeholder="Kurze Beschreibung für Google..." oninput="updateCharCount('postDesc', 'descCount', 160)">
            <div class="char-count" id="descCount">0 / 160</div>
          </div>
          <div class="field">
            <label>SEO-Keywords <span class="hint">(kommagetrennt)</span></label>
            <input type="text" id="postKeywords" placeholder="z.B. Solaranlage, Speicher, Autarkie, 2026">
          </div>
          <div class="field">
            <label>URL-Slug <span class="hint">(wird automatisch generiert, optional anpassen)</span></label>
            <input type="text" id="postSlug" placeholder="wird-automatisch-generiert">
          </div>
        </div>

        <div class="editor-actions">
          <button class="btn" id="saveBtn" onclick="savePost()">Veröffentlichen</button>
          <button class="btn btn-secondary" onclick="previewPost()">Vorschau</button>
          <button class="btn btn-secondary" onclick="showList()">Abbrechen</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Preview Modal -->
  <div id="previewModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; overflow-y:auto; padding:2rem;">
    <div style="max-width:700px; margin:0 auto; background:#111; border-radius:12px; padding:2rem; position:relative;">
      <button onclick="document.getElementById('previewModal').style.display='none'" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;">&times;</button>
      <div id="previewContent" style="color:#ccc; line-height:1.7;"></div>
    </div>
  </div>

  <script>
    var TOKEN = '';
    var REPO = 'ecdyn/autarkie-finder-blog';
    var BRANCH = 'main';
    var editingPath = null;
    var editingSha = null;

    var categoryLabels = { energie:'Energie', wasser:'Wasser', ernaehrung:'Ernährung', wohnen:'Wohnen', offgrid:'Off-Grid', technik:'Technik' };

    if (localStorage.getItem('gh_token')) {
      TOKEN = localStorage.getItem('gh_token');
      showCMS();
    }

    function login() {
      var t = document.getElementById('tokenInput').value.trim();
      if (!t) return;
      TOKEN = t;
      localStorage.setItem('gh_token', t);
      showCMS();
    }

    function logout() {
      TOKEN = '';
      localStorage.removeItem('gh_token');
      document.getElementById('cmsView').style.display = 'none';
      document.getElementById('loginView').style.display = 'flex';
    }

    function showCMS() {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('cmsView').style.display = 'block';
      loadPosts();
    }

    function showList() {
      document.getElementById('editor').style.display = 'none';
      document.getElementById('postList').style.display = 'block';
      editingPath = null;
      editingSha = null;
      loadPosts();
    }

    function showStatus(msg, type) {
      var el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = 'status ' + type;
      setTimeout(function() { el.className = 'status'; }, 4000);
    }

    function updateCharCount(inputId, countId, max) {
      var len = document.getElementById(inputId).value.length;
      var el = document.getElementById(countId);
      el.textContent = len + ' / ' + max;
      el.style.color = len > max ? '#ef4444' : len > max * 0.75 ? '#eab308' : '#555';
    }

    function previewImage() {
      var url = document.getElementById('postImage').value.trim();
      var img = document.getElementById('imagePreview');
      if (url) { img.src = url; img.style.display = 'block'; img.onerror = function() { img.style.display = 'none'; }; }
      else { img.style.display = 'none'; }
    }

    function generateSlug(title) {
      return title.toLowerCase()
        .replace(/[äÄ]/g,'ae').replace(/[öÖ]/g,'oe').replace(/[üÜ]/g,'ue').replace(/[ß]/g,'ss')
        .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    }

    async function ghAPI(path, options) {
      var url = 'https://api.github.com/repos/' + REPO + path;
      var headers = { 'Authorization': 'token ' + TOKEN, 'Accept': 'application/vnd.github.v3+json' };
      if (options && options.body) headers['Content-Type'] = 'application/json';
      var res = await fetch(url, Object.assign({ headers: headers }, options || {}));
      if (res.status === 401) { logout(); throw new Error('Token ungültig'); }
      return res;
    }

    async function loadPosts() {
      var container = document.getElementById('posts');
      container.innerHTML = '<div class="loading">Beiträge werden geladen...</div>';
      try {
        var res = await ghAPI('/contents/_posts?ref=' + BRANCH);
        if (res.status === 404) {
          container.innerHTML = '<div class="empty">Noch keine Beiträge. Erstelle deinen ersten!</div>';
          return;
        }
        var files = await res.json();
        if (!files.length) {
          container.innerHTML = '<div class="empty">Noch keine Beiträge.</div>';
          return;
        }
        files.sort(function(a, b) { return b.name.localeCompare(a.name); });
        container.innerHTML = '';
        for (var i = 0; i < files.length; i++) {
          var f = files[i];
          // Quick parse to get category
          var contentRes = await ghAPI('/contents/' + f.path + '?ref=' + BRANCH);
          var contentData = await contentRes.json();
          var decoded = decodeURIComponent(escape(atob(contentData.content.replace(/\n/g, ''))));
          var catMatch = decoded.match(/category:\s*(\w+)/);
          var cat = catMatch ? catMatch[1] : '';
          var catLabel = categoryLabels[cat] || cat;
          var statusMatch = decoded.match(/status:\s*(\w+)/);
          var postStatus = statusMatch ? statusMatch[1] : 'publish';
          var publishDateMatch = decoded.match(/publish_date:\s*"?([^"\n]*)"?/);
          var publishTimeMatch = decoded.match(/publish_time:\s*"?([^"\n]*)"?/);

          // Check if scheduled post should be live
          var statusTag = '';
          if (postStatus === 'scheduled') {
            var pd = publishDateMatch ? publishDateMatch[1] : '';
            var pt = publishTimeMatch ? publishTimeMatch[1] : '08:00';
            if (pd && new Date(pd + 'T' + pt) <= new Date()) {
              statusTag = '<span class="status-tag live">Live</span>';
            } else {
              statusTag = '<span class="status-tag scheduled">Geplant' + (pd ? ' · ' + pd + ' ' + pt : '') + '</span>';
            }
          } else if (postStatus === 'draft') {
            statusTag = '<span class="status-tag draft">Entwurf</span>';
          } else {
            statusTag = '<span class="status-tag live">Live</span>';
          }

          var name = f.name.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace('.md', '').replace(/-/g, ' ');
          var date = f.name.substring(0, 10);
          var div = document.createElement('div');
          div.className = 'post-item';
          div.innerHTML =
            '<div class="post-item-info" onclick="editPost(\'' + f.path + '\')">' +
              '<h4>' + name.charAt(0).toUpperCase() + name.slice(1) + '</h4>' +
              '<div class="meta">' +
                (catLabel ? '<span class="cat-tag">' + catLabel + '</span>' : '') +
                statusTag +
                '<span>' + date + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="post-item-actions">' +
              '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();editPost(\'' + f.path + '\')">Bearbeiten</button>' +
              '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deletePost(\'' + f.path + '\',\'' + contentData.sha + '\')">Löschen</button>' +
            '</div>';
          container.appendChild(div);
        }
      } catch (e) {
        container.innerHTML = '<div class="empty" style="color:#ef4444;">Fehler: ' + e.message + '</div>';
      }
    }

    function newPost() {
      editingPath = null;
      editingSha = null;
      document.getElementById('editorTitle').textContent = 'Neuer Beitrag';
      document.getElementById('postTitle').value = '';
      document.getElementById('postCategory').value = 'energie';
      document.getElementById('postDesc').value = '';
      document.getElementById('postTime').value = '5';
      document.getElementById('postContent').value = '';
      document.getElementById('postImage').value = '';
      document.getElementById('postImageAlt').value = '';
      document.getElementById('postKeywords').value = '';
      document.getElementById('postSlug').value = '';
      document.getElementById('postStatus').value = 'publish';
      document.getElementById('postDate').value = '';
      document.getElementById('postTimeSchedule').value = '08:00';
      document.getElementById('scheduleFields').style.display = 'none';
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('descCount').textContent = '0 / 160';
      document.getElementById('postList').style.display = 'none';
      document.getElementById('editor').style.display = 'block';
      window.scrollTo(0, 0);
    }

    function toggleSchedule() {
      var status = document.getElementById('postStatus').value;
      var fields = document.getElementById('scheduleFields');
      var btn = document.getElementById('saveBtn');
      if (status === 'scheduled') {
        fields.style.display = 'block';
        btn.textContent = 'Planen';
        // Default to tomorrow 8:00
        if (!document.getElementById('postDate').value) {
          var tomorrow = new Date();
          tomorrow.setDate(tomorrow.getDate() + 1);
          document.getElementById('postDate').value = tomorrow.toISOString().substring(0, 10);
        }
        updateScheduleInfo();
      } else if (status === 'draft') {
        fields.style.display = 'none';
        btn.textContent = 'Als Entwurf speichern';
      } else {
        fields.style.display = 'none';
        btn.textContent = 'Veröffentlichen';
      }
    }

    function updateScheduleInfo() {
      var date = document.getElementById('postDate').value;
      var time = document.getElementById('postTimeSchedule').value;
      var info = document.getElementById('scheduleInfo');
      if (date && time) {
        var d = new Date(date + 'T' + time);
        var now = new Date();
        var diff = d - now;
        if (diff <= 0) {
          info.innerHTML = '⚠️ Dieses Datum liegt in der Vergangenheit – wird sofort veröffentlicht.';
          info.style.color = '#eab308';
        } else {
          var hours = Math.floor(diff / 3600000);
          var days = Math.floor(hours / 24);
          var remainder = hours % 24;
          var timeStr = days > 0 ? days + ' Tag' + (days > 1 ? 'e' : '') + ' und ' + remainder + ' Std.' : hours + ' Stunden';
          info.innerHTML = '📅 Wird veröffentlicht in ' + timeStr;
          info.style.color = '#22c55e';
        }
      }
    }

    async function editPost(path) {
      document.getElementById('postList').style.display = 'none';
      document.getElementById('editor').style.display = 'block';
      document.getElementById('editorTitle').textContent = 'Beitrag bearbeiten';
      window.scrollTo(0, 0);
      try {
        var res = await ghAPI('/contents/' + path + '?ref=' + BRANCH);
        var data = await res.json();
        var content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
        editingPath = path;
        editingSha = data.sha;
        var parts = content.split('---');
        if (parts.length >= 3) {
          var front = parts[1];
          var body = parts.slice(2).join('---').trim();
          var gv = function(key) {
            var m = front.match(new RegExp(key + ':\\s*"?([^"\\n]*)"?'));
            return m ? m[1].trim() : '';
          };
          document.getElementById('postTitle').value = gv('title');
          document.getElementById('postCategory').value = gv('category') || 'energie';
          document.getElementById('postDesc').value = gv('description');
          document.getElementById('postTime').value = gv('reading_time') || '5';
          document.getElementById('postImage').value = gv('image');
          document.getElementById('postImageAlt').value = gv('image_alt');
          document.getElementById('postKeywords').value = gv('keywords');
          document.getElementById('postSlug').value = path.replace('_posts/', '').replace(/^\d{4}-\d{2}-\d{2}-/, '').replace('.md', '');
          document.getElementById('postContent').value = body;
          // Load status
          var postStatusVal = gv('status') || 'publish';
          var publishDate = gv('publish_date') || '';
          var publishTime = gv('publish_time') || '08:00';
          document.getElementById('postStatus').value = postStatusVal;
          if (postStatusVal === 'scheduled') {
            document.getElementById('postDate').value = publishDate;
            document.getElementById('postTimeSchedule').value = publishTime;
            document.getElementById('scheduleFields').style.display = 'block';
            updateScheduleInfo();
          } else {
            document.getElementById('scheduleFields').style.display = 'none';
          }
          previewImage();
          updateCharCount('postDesc', 'descCount', 160);
        }
      } catch (e) {
        showStatus('Fehler beim Laden: ' + e.message, 'error');
      }
    }

    async function deletePost(path, sha) {
      if (!confirm('Beitrag wirklich löschen?')) return;
      try {
        var res = await ghAPI('/contents/' + path, {
          method: 'DELETE',
          body: JSON.stringify({ message: 'Beitrag gelöscht', sha: sha, branch: BRANCH })
        });
        if (res.ok) {
          showStatus('Beitrag gelöscht! Sitemap wird aktualisiert...', 'success');
          await updateSitemap();
          loadPosts();
        } else {
          var err = await res.json();
          showStatus('Fehler: ' + (err.message || 'Unbekannt'), 'error');
        }
      } catch (e) {
        showStatus('Fehler: ' + e.message, 'error');
      }
    }

    async function savePost() {
      var title = document.getElementById('postTitle').value.trim();
      var category = document.getElementById('postCategory').value;
      var desc = document.getElementById('postDesc').value.trim();
      var time = document.getElementById('postTime').value;
      var content = document.getElementById('postContent').value;
      var image = document.getElementById('postImage').value.trim();
      var imageAlt = document.getElementById('postImageAlt').value.trim();
      var keywords = document.getElementById('postKeywords').value.trim();
      var customSlug = document.getElementById('postSlug').value.trim();

      if (!title) { showStatus('Bitte Titel eingeben', 'error'); return; }
      if (!content) { showStatus('Bitte Inhalt eingeben', 'error'); return; }
      if (!desc) { showStatus('Bitte SEO-Beschreibung eingeben', 'error'); return; }

      var status = document.getElementById('postStatus').value;
      var schedDate = document.getElementById('postDate').value;
      var schedTime = document.getElementById('postTimeSchedule').value || '08:00';

      // If scheduled date is in the past, publish immediately
      if (status === 'scheduled' && schedDate) {
        var schedDT = new Date(schedDate + 'T' + schedTime);
        if (schedDT <= new Date()) status = 'publish';
      }

      var now = new Date();
      var dateStr = (status === 'scheduled' && schedDate) ? schedDate : now.toISOString().substring(0, 10);
      var slug = customSlug || generateSlug(title);

      var fm = '---\n';
      fm += 'title: "' + title.replace(/"/g, '\\"') + '"\n';
      fm += 'date: ' + dateStr + '\n';
      fm += 'author: Autarkie-Finder\n';
      fm += 'category: ' + category + '\n';
      fm += 'description: "' + desc.replace(/"/g, '\\"') + '"\n';
      fm += 'reading_time: ' + time + '\n';
      fm += 'status: ' + status + '\n';
      if (status === 'scheduled') {
        fm += 'publish_date: "' + schedDate + '"\n';
        fm += 'publish_time: "' + schedTime + '"\n';
      }
      if (image) fm += 'image: "' + image + '"\n';
      if (imageAlt) fm += 'image_alt: "' + imageAlt + '"\n';
      if (keywords) fm += 'keywords: "' + keywords + '"\n';
      fm += 'featured: false\n';
      fm += '---\n\n';

      var fullContent = fm + content;
      var encoded = btoa(unescape(encodeURIComponent(fullContent)));
      var path = editingPath || '_posts/' + dateStr + '-' + slug + '.md';

      var body = { message: editingPath ? 'Update: ' + title : 'Neu: ' + title, content: encoded, branch: BRANCH };
      if (editingSha) body.sha = editingSha;

      try {
        var res = await ghAPI('/contents/' + path, { method: 'PUT', body: JSON.stringify(body) });
        if (res.ok) {
          showStatus('Beitrag veröffentlicht! Sitemap wird aktualisiert...', 'success');
          await updateSitemap();
          showList();
        } else {
          var err = await res.json();
          showStatus('Fehler: ' + (err.message || 'Unbekannt'), 'error');
        }
      } catch (e) {
        showStatus('Fehler: ' + e.message, 'error');
      }
    }

    async function updateSitemap() {
      try {
        // Get all posts
        var res = await ghAPI('/contents/_posts?ref=' + BRANCH);
        var files = await res.json();
        if (!Array.isArray(files)) return;

        var today = new Date().toISOString().substring(0, 10);

        var xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
        xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';
        xml += '  <url>\n';
        xml += '    <loc>https://blog.autarkie-finder.com/</loc>\n';
        xml += '    <lastmod>' + today + '</lastmod>\n';
        xml += '    <changefreq>weekly</changefreq>\n';
        xml += '    <priority>1.0</priority>\n';
        xml += '  </url>\n';

        for (var i = 0; i < files.length; i++) {
          var f = files[i];
          if (!f.name.endsWith('.md')) continue;
          var slug = f.name.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace('.md', '');
          var date = f.name.substring(0, 10);
          xml += '  <url>\n';
          xml += '    <loc>https://blog.autarkie-finder.com/' + slug + '</loc>\n';
          xml += '    <lastmod>' + date + '</lastmod>\n';
          xml += '    <changefreq>monthly</changefreq>\n';
          xml += '    <priority>0.8</priority>\n';
          xml += '  </url>\n';
        }

        xml += '</urlset>';

        // Get current sitemap sha
        var sitemapRes = await ghAPI('/contents/sitemap.xml?ref=' + BRANCH);
        var sitemapBody = { message: 'Sitemap aktualisiert', content: btoa(unescape(encodeURIComponent(xml))), branch: BRANCH };
        if (sitemapRes.ok) {
          var sitemapData = await sitemapRes.json();
          sitemapBody.sha = sitemapData.sha;
        }

        await ghAPI('/contents/sitemap.xml', { method: 'PUT', body: JSON.stringify(sitemapBody) });
      } catch (e) {
        console.error('Sitemap update failed:', e);
      }
    }

    function previewPost() {
      var title = document.getElementById('postTitle').value || 'Ohne Titel';
      var content = document.getElementById('postContent').value || '';
      var image = document.getElementById('postImage').value || '';
      var html = '<h1 style="font-size:1.6rem;margin-bottom:1rem;">' + title + '</h1>';
      if (image) html += '<img src="' + image + '" style="width:100%;border-radius:8px;margin-bottom:1rem;" onerror="this.style.display=\'none\'">';
      html += '<div style="line-height:1.8;">' + content.replace(/\n/g, '<br>') + '</div>';
      document.getElementById('previewContent').innerHTML = html;
      document.getElementById('previewModal').style.display = 'block';
    }

    // Auto-generate slug from title
    document.getElementById('postTitle').addEventListener('input', function() {
      if (!editingPath) {
        document.getElementById('postSlug').value = generateSlug(this.value);
      }
    });

    // Update schedule info when date/time changes
    document.getElementById('postDate').addEventListener('input', updateScheduleInfo);
    document.getElementById('postTimeSchedule').addEventListener('input', updateScheduleInfo);
  </script>

</body>
