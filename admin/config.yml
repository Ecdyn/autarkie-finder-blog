backend:
  name: github
  repo: ecdyn/autarkie-finder-blog
  branch: main
  base_url: https://heartfelt-hamster-babbea.netlify.app
  auth_endpoint: /.netlify/identity/authorize

media_folder: "images/uploads"
public_folder: "/images/uploads"
locale: "de"

collections:
  - name: "blog"
    label: "Blog-Beiträge"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Titel"
        name: "title"
        widget: "string"
      - label: "Datum"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
      - label: "Autor"
        name: "author"
        widget: "string"
        default: "Autarkie-Finder"
      - label: "Kategorie"
        name: "category"
        widget: "select"
        options:
          - label: "Energie"
            value: "energie"
          - label: "Wasser"
            value: "wasser"
          - label: "Ernaehrung"
            value: "ernaehrung"
          - label: "Wohnen"
            value: "wohnen"
          - label: "Off-Grid"
            value: "offgrid"
          - label: "Technik"
            value: "technik"
      - label: "Beitragsbild"
        name: "image"
        widget: "image"
        required: false
      - label: "Beschreibung (SEO)"
        name: "description"
        widget: "text"
      - label: "Lesezeit (Minuten)"
        name: "reading_time"
        widget: "number"
        default: 5
      - label: "Empfohlen"
        name: "featured"
        widget: "boolean"
        default: false
      - label: "Inhalt"
        name: "body"
        widget: "markdown"
